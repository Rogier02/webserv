<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>404 Not Found — webserv</title>
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body {
			background: #0e0e0e;
			color: #d4d4d4;
			font-family: 'IBM Plex Mono', monospace;
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			padding: 24px;
		}
		.box {
			text-align: center;
		}
		.code {
			font-size: 80px;
			font-weight: 600;
			color: #1e1e1e;
			line-height: 1;
		}
		.msg {
			font-size: 14px;
			color: #555;
			margin-top: 12px;
		}
		a {
			display: inline-block;
			margin-top: 24px;
			font-size: 13px;
			color: #c8f135;
			text-decoration: none;
			border: 1px solid #7a9420;
			padding: 8px 18px;
			border-radius: 4px;
		}
		a:hover { background: #c8f135; color: #000; }
	</style>
</head>
<body>
	<div class="box">
		<div class="code">404</div>
		<p class="msg">Not Found</p>
		<a href="/">← back to test suite</a>
	</div>
</body>
</html>
