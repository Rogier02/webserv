<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>500 Internal Server Error — webserv</title>
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body {
			background: #0e0e0e;
			color: #d4d4d4;
			font-family: 'IBM Plex Mono', monospace;
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			padding: 24px;
		}
		.box { text-align: center; }
		.code { font-size: 80px; font-weight: 600; color: #1e1e1e; line-height: 1; }
		.msg  { font-size: 14px; color: #555; margin-top: 12px; }
		a {
			display: inline-block;
			margin-top: 24px;
			font-size: 13px;
			color: #ff4545;
			text-decoration: none;
			border: 1px solid #6b2020;
			padding: 8px 18px;
			border-radius: 4px;
		}
		a:hover { background: #ff4545; color: #fff; }
	</style>
</head>
<body>
	<div class="box">
		<div class="code">500</div>
		<p class="msg">Internal Server Error</p>
		<a href="/">← back to test suite</a>
	</div>
</body>
</html>
