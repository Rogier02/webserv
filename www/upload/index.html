<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HTTP/1.0 POST Tester</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        textarea {
            width: 100%;
            height: 150px;
        }
        input, button {
            margin-top: 10px;
            padding: 6px;
        }
        #response {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            white-space: pre-wrap;
            background: #f5f5f5;
        }
    </style>
</head>
<body>

<h2>HTTP POST Request Tester</h2>

<label>
    Filename:
    <input type="text" id="filename" value="file">
</label>
<br>

<label>
    Request Body:
    <textarea id="body"></textarea>
</label>
<br>

<button onclick="sendPost()">Send POST</button>

<button onclick="sendDelete()">Send DELETE</button>

<h3>Response:</h3>
<div id="response"></div>

<script>
async function sendPost() {
    const endpoint = "http://localhost:8080/upload/" + document.getElementById("filename").value.trim();
    const body = document.getElementById("body").value;
    const responseDiv = document.getElementById("response");

    responseDiv.textContent = "Sending...";

    try {
        const response = await fetch(endpoint, {
            method: "POST",
            headers: {
                "Content-Type": "text/plain"
            },
            body: body
        });

        const text = await response.text();

        responseDiv.textContent =
            "Status: " + response.status + " " + response.statusText + "\n\n" + text;
    } catch (error) {
        responseDiv.textContent = "Error: " + error.message;
    }
}

async function sendDelete() {
    const endpoint = "http://localhost:8080/vault/" + document.getElementById("filename").value.trim();
    const responseDiv = document.getElementById("response");

    responseDiv.textContent = "Sending DELETE...";

    try {
        const response = await fetch(endpoint, {
            method: "DELETE"
        });

        const text = await response.text();

        responseDiv.textContent =
            "Status: " + response.status + " " + response.statusText + "\n\n" + text;
    } catch (error) {
        responseDiv.textContent = "Error: " + error.message;
    }
}
</script>

</body>
</html>
