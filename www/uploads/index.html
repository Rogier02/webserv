<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>webserv — test suite</title>
	<link rel="stylesheet" href="../style.css">
</head>
<body>

<header>
	<div class="header-inner">
		<div class="logo">
			<a href="/" style="text-decoration: none; color: inherit;">
				<span class="logo-bracket">[</span>webserv<span class="logo-bracket">]</span>
			</a>
		</div>
		<nav class="nav">
			<a href="/cgi">CGI</a>
			<a href="/uploads">Uploads</a>
		</nav>
	</div>
</header>

<main>

	<section class="card">
		<div class="card-label">01</div>
		<h2>POST — upload file</h2>
		<p class="card-desc">
			Upload a file to the server.
			The server stores it under <code>/uploads/</code> via the CGI handler.
		</p>

		<label>
			<input type="text" id="filename" name="path" value="file">
		</label>

		<label>
			<textarea id="content">Hello World!</textarea>
		</label>
		<button onclick="sendPost(filename.value, content.value)" type="submit" class="btn">Send POST</button>

	</section>

	<section class="card">
		<div class="card-label">03</div>
		<h2>DELETE — remove a file</h2>

		<label>
			<input type="text" id="deletePath" name="path" value="file">
		</label>
		<button onclick="sendDelete(deletePath.value)" type="submit" class="btn btn-danger">Send DELETE</button>
	</section>

</main>

<footer>
	<p>Http/1.0</p>
</footer>

<script>
	async function sendPost(URI, content) {
		const endpoint = "http://localhost:8080/uploads/" + URI;
		fetch(endpoint, {
				method: "POST",
				headers: {
					"Content-Type": "text/plain"
				},
				body: content
			});
	}

	async function sendDelete(URI) {
		const endpoint = "http://localhost:8080/uploads/" + URI;
		fetch(endpoint, {
			method: "DELETE"
		});
	}
</script>

</body>
</html>
