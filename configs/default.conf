# Default HTTP Server Configuration

Server {

	# Basic server settings
	server_name defaultServer;
	listen 128.0.0.1:8080;
	client_max_body_size 10m;
	root /www;

	# Error pages
	error_page 400 ./www/errorPages/400.html;
	error_page 404 ./www/errorPages/404.html;
	error_page 500 ./www/errorPages/500.html;
	error_page 501 ./www/errorPages/501.html;

	# Static file serving
	location / {
		root /;
		index /index.html;
		allowed_methods GET;
		autoindex off;
	}

	# Location that supports uploads
	location /uploads {
		root /uploads;
		index /index.html;
		allowed_methods GET POST DELETE;
		upload_dir /;
		client_max_body_size 50m;
	}

	# CGI scripts (direct /cgi-bin path)
	location /cgi {
		root /cgi-bin;
		index /index.html;
		allowed_methods GET POST;
		cgi_ext .py .php;
	}

	# Redirect old paths
	location /oldsite {
		return 301 /;
	}
}
