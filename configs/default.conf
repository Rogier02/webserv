Server {
	server_name defaultServer;
	listen 127.0.0.1:8080;
	client_max_body_size 0;
	root /www;

	error_page 400 ./www/errorPages/400.html;
	error_page 404 ./www/errorPages/404.html;
	error_page 500 ./www/errorPages/500.html;
	error_page 501 ./www/errorPages/501.html;

	location / {
		index /index.html;
		allowed_methods GET;
	}

	location /uploads {
		root /upload;
		index /indexWithAnOddName.html;
		upload_dir /;
		client_max_body_size 50m;
		allowed_methods GET POST DELETE;
	}

	location /cgi {
		root /cgi-bin;
		# index /index.html;
		autoindex on;
		cgi_ext .py .php;
		allowed_methods GET;
	}

	location /oldroot {
		return 301 /;
	}
}
