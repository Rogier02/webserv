# Default HTTP Server Configuration

Server {

	# Basic server settings
	server_name defaultServer;
	listen 128.0.0.1:8080;
	client_max_body_size 10m;
	root /www;

	# Error pages
	error_page 400 ./www/errorPages/400.html;
	error_page 404 ./www/errorPages/404.html;
	error_page 500 ./www/errorPages/500.html;
	error_page 501 ./www/errorPages/501.html;

	# Static file serving
	location / {
		root /www;
		index /index.html;
		allowed_methods GET;
		autoindex off;
	}

	# Images directory with autoindex enabled
	location /images {
		root /www/media/images;
		allowed_methods GET;
		autoindex on;
	}

	# Location that supports uploads
	location /upload {
		root /www/upload;
		index /index.html;
		allowed_methods GET POST;
		upload_dir /files;
		client_max_body_size 50m;
	}

	# CGI
	location /cgi {
		root /www/cgi-bin;
		index /index.html;
		allowed_methods GET;
		cgi_ext .py .php;
	}

	# Redirect old paths
	location /oldsite {
		return 301 /;
	}
}
