Server {

	server_name defaultServer;
	listen 127.0.0.1:8080;
	client_max_body_size 10m;
	root /www;

	error_page 400 ./www/errorPages/400.html;
	error_page 404 ./www/errorPages/404.html;
	error_page 500 ./www/errorPages/500.html;
	error_page 501 ./www/errorPages/501.html;

	location / {
		index /index.html;
		allowed_methods GET;
		autoindex off;
	}

	location /uploads {
		root /uploads;
		index /indexWithAnOddName.html;
		allowed_methods GET POST DELETE;
		upload_dir /;
		client_max_body_size 50m;
	}

	location /cgi {
		root /cgi-bin;
		index /index.html;
		allowed_methods GET POST;
		cgi_ext .py .php;
	}

	location /oldsite {
		return 301 /;
	}
}

